<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rummikub 計時器 | 靈風中學 數學周 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --dark: #2C3E50;
            --light: #ECF0F1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
        }
        
        /* Container */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* Setup Screen */
        .setup-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .setup-card h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        
        .player-count-btns {
            display: flex;
            gap: 10px;
        }
        .player-count-btns button {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--primary);
            background: white;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .player-count-btns button.active {
            background: var(--primary);
            color: white;
        }
        
        .player-inputs { margin-top: 20px; }
        .player-input {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .player-input .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .player-input input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        .time-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .time-input input {
            width: 80px;
            padding: 10px;
            border: 2px solid var(--primary);
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
        }
        
        .start-btn {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* Game Screen */
        .game-header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .players-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .player-dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .player-dot.active {
            background: var(--success);
            color: white;
            box-shadow: 0 0 20px var(--success);
        }
        .player-dot .score {
            position: absolute;
            bottom: -25px;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        
        .timer-display {
            text-align: center;
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
        }
        .timer-display.warning { color: var(--warning); }
        .timer-display.danger { color: var(--danger); }
        
        .current-player-name {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .game-controls {
            display: flex;
            gap: 10px;
        }
        .game-controls button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-pause { background: var(--warning); color: white; }
        .btn-end { background: var(--danger); color: white; }
        .btn-finish { background: var(--success); color: white; }
        
        /* Scoring Screen */
        .scoring-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .scoring-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .scoring-players {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .scoring-player {
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .scoring-player.active {
            background: #e8f5e9;
            border: 2px solid var(--success);
        }
        .scoring-player .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
            font-weight: bold;
        }
        .scoring-player.active .avatar {
            background: var(--success);
            color: white;
        }
        
        .score-input-area {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .current-expression {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 10px;
            min-height: 40px;
        }
        .current-total {
            font-size: 2rem;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
        }
        
        .tile-buttons {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .tile-btn {
            padding: 15px 5px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .tile-btn.number { background: #e3f2fd; color: var(--dark); }
        .tile-btn.joker { background: #ffebee; color: var(--danger); }
        .tile-btn.quick { background: #fff3e0; color: var(--warning); }
        
        .control-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .control-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-clear { background: #ffebee; color: var(--danger); }
        .btn-all-clear { background: #ff9800; color: white; }
        .btn-confirm { background: var(--success); color: white; font-size: 1.2rem; }
        
        .next-player-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        /* Result Screen */
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .result-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .result-header h2 { color: var(--primary); }
        
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .result-table th, .result-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        .result-table th { background: #f8f9fa; }
        .result-table .winner {
            background: #e8f5e9;
            font-weight: bold;
        }
        
        .result-buttons {
            display: flex;
            gap: 10px;
        }
        .result-buttons button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-next-round { background: var(--success); color: white; }
        .btn-end-game { background: var(--dark); color: white; }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: white;
        }
        footer a { color: white; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Setup Screen -->
        <div id="setupScreen" class="screen active">
            <div class="setup-card">
                <h1>🎲 Rummikub 計時器</h1>
                
                <div class="form-group">
                    <label>👥 玩家人數</label>
                    <div class="player-count-btns">
                        <button onclick="setPlayerCount(2)">2人</button>
                        <button onclick="setPlayerCount(3)">3人</button>
                        <button onclick="setPlayerCount(4)" class="active">4人</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📝 玩家名稱</label>
                    <div class="player-inputs" id="playerInputs">
                        <!-- Generated by JS -->
                    </div>
                </div>
                
                <div class="form-group">
                    <label>⏱️ 每回合思考時間 (秒)</label>
                    <div class="time-input">
                        <input type="number" id="timeLimit" value="60">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🎯 開始玩家</label>
                    <div class="player-count-btns">
                        <button onclick="setStartPlayer('random')" class="active">🎲 隨機</button>
                        <button onclick="setStartPlayer(0)">玩家1</button>
                        <button onclick="setStartPlayer(1)">玩家2</button>
                    </div>
                </div>
                
                <button class="start-btn" onclick="startGame()">🚀 開始遊戲</button>
            </div>
        </div>
        
        <!-- Game Screen -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="players-row" id="gamePlayers">
                    <!-- Generated by JS -->
                </div>
                <div class="current-player-name" id="currentPlayerName">玩家1 既回合</div>
                <div class="timer-display" id="timerDisplay">60</div>
                <div class="game-controls">
                    <button class="btn-pause" onclick="togglePause()">⏸️ 暫停</button>
                    <button class="btn-end" onclick="endTurn()">⏭️ End Turn</button>
                    <button class="btn-finish" onclick="finishRound()">🏁 Finish Round</button>
                </div>
            </div>
        </div>
        
        <!-- Scoring Screen -->
        <div id="scoringScreen" class="screen">
            <div class="scoring-card">
                <div class="scoring-header">
                    <h2>📊 輸入分數 - Round <span id="currentRound">1</span></h2>
                </div>
                
                <div class="scoring-players" id="scoringPlayers">
                    <!-- Generated by JS -->
                </div>
                
                <div class="score-input-area">
                    <div class="current-expression" id="currentExpression"></div>
                    <div class="current-total" id="currentTotal">= 0</div>
                </div>
                
                <div class="tile-buttons">
                    <button class="tile-btn number" onclick="addTile(1)">1</button>
                    <button class="tile-btn number" onclick="addTile(2)">2</button>
                    <button class="tile-btn number" onclick="addTile(3)">3</button>
                    <button class="tile-btn number" onclick="addTile(4)">4</button>
                    <button class="tile-btn number" onclick="addTile(5)">5</button>
                    <button class="tile-btn number" onclick="addTile(6)">6</button>
                    <button class="tile-btn number" onclick="addTile(7)">7</button>
                    <button class="tile-btn number" onclick="addTile(8)">8</button>
                    <button class="tile-btn number" onclick="addTile(9)">9</button>
                    <button class="tile-btn number" onclick="addTile(10)">10</button>
                    <button class="tile-btn number" onclick="addTile(11)">11</button>
                    <button class="tile-btn number" onclick="addTile(12)">12</button>
                    <button class="tile-btn number" onclick="addTile(13)">13</button>
                    <button class="tile-btn joker" onclick="addTile(25)">🃏<br>25</button>
                    <button class="tile-btn quick" onclick="addTile(100)">100</button>
                    <button class="tile-btn quick" onclick="addTile(200)">200</button>
                </div>
                
                <div class="control-buttons">
                    <button class="btn-clear" onclick="clearLast()">C</button>
                    <button class="btn-all-clear" onclick="clearAll()">AC</button>
                    <button class="btn-confirm" onclick="confirmScore()">✓ 確認</button>
                </div>
                
                <button class="next-player-btn" onclick="nextScoringPlayer()" id="nextScoringBtn" style="display:none;">
                    ⏭️ 下一位玩家
                </button>
            </div>
        </div>
        
        <!-- Result Screen -->
        <div id="resultScreen" class="screen">
            <div class="result-card">
                <div class="result-header">
                    <h2>🏆 Round <span id="resultRound">1</span> 結果</h2>
                </div>
                
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>玩家</th>
                            <th>今回合</th>
                            <th>總分</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody">
                        <!-- Generated by JS -->
                    </tbody>
                </table>
                
                <div class="result-buttons">
                    <button class="btn-next-round" onclick="nextRound()">🔄 Next Round</button>
                    <button class="btn-end-game" onclick="endGame()">🏁 End Game</button>
                </div>
            </div>
        </div>
        
        <!-- Final Result Screen -->
        <div id="finalResultScreen" class="screen">
            <div class="result-card">
                <div class="result-header">
                    <h2>🎉 最終結果</h2>
                </div>
                
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>玩家</th>
                            <th>總分</th>
                        </tr>
                    </thead>
                    <tbody id="finalResultBody">
                        <!-- Generated by JS -->
                    </tbody>
                </table>
                
                <button class="start-btn" onclick="resetGame()">🔄 重新遊戲</button>
            </div>
        </div>
    </div>
    
    <footer>
        <p>🎲 靈風中學 數學周 2026 | <a href="index.html">返回首頁</a></p>
    </footer>
    
    <script>
        // Game State
        let playerCount = 4;
        let playerNames = ['玩家1', '玩家2', '玩家3', '玩家4'];
        let timeLimit = 60;
        let startPlayer = 'random';
        
        let currentPlayerIndex = 0;
        let timer = 60;
        let timerInterval = null;
        let isPaused = false;
        
        let round = 1;
        let scores = [0, 0, 0, 0];
        let currentScoringIndex = 0;
        let currentTiles = [];
        
        // Initialize
        function init() {
            generatePlayerInputs();
        }
        
        function setPlayerCount(count) {
            playerCount = count;
            document.querySelectorAll('.player-count-btns button').forEach((btn, i) => {
                if (i < 3) btn.classList.remove('active');
            });
            event.target.classList.add('active');
            generatePlayerInputs();
        }
        
        function generatePlayerInputs() {
            const container = document.getElementById('playerInputs');
            container.innerHTML = '';
            for (let i = 0; i < playerCount; i++) {
                container.innerHTML += `
                    <div class="player-input">
                        <div class="avatar">${String.fromCharCode(65 + i)}</div>
                        <input type="text" placeholder="玩家${i + 1}" value="玩家${i + 1}" onchange="playerNames[${i}] = this.value">
                    </div>
                `;
            }
        }
        
        function setStartPlayer(player) {
            startPlayer = player;
            document.querySelectorAll('.form-group:last-child .player-count-btns button').forEach((btn, i) => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function startGame() {
            timeLimit = parseInt(document.getElementById('timeLimit').value) || 60;
            
            if (startPlayer === 'random') {
                currentPlayerIndex = Math.floor(Math.random() * playerCount);
            } else {
                currentPlayerIndex = startPlayer;
            }
            
            scores = new Array(playerCount).fill(0);
            round = 1;
            
            showScreen('gameScreen');
            updateGameUI();
            startTimer();
        }
        
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        
        function updateGameUI() {
            const playersContainer = document.getElementById('gamePlayers');
            playersContainer.innerHTML = '';
            for (let i = 0; i < playerCount; i++) {
                playersContainer.innerHTML += `
                    <div class="player-dot ${i === currentPlayerIndex ? 'active' : ''}">
                        ${String.fromCharCode(65 + i)}
                        <div class="score">${scores[i]}分</div>
                    </div>
                `;
            }
            document.getElementById('currentPlayerName').textContent = `${playerNames[currentPlayerIndex]} 既回合`;
        }
        
        function startTimer() {
            timer = timeLimit;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    timer--;
                    updateTimerDisplay();
                    if (timer <= 0) {
                        endTurn();
                    }
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const display = document.getElementById('timerDisplay');
            display.textContent = timer;
            display.className = 'timer-display';
            if (timer <= 10) display.classList.add('danger');
            else if (timer <= 20) display.classList.add('warning');
        }
        
        function togglePause() {
            isPaused = !isPaused;
            document.querySelector('.btn-pause').textContent = isPaused ? '▶️ 繼續' : '⏸️ 暫停';
        }
        
        function endTurn() {
            clearInterval(timerInterval);
            currentPlayerIndex = (currentPlayerIndex + 1) % playerCount;
            updateGameUI();
            startTimer();
        }
        
        function finishRound() {
            clearInterval(timerInterval);
            currentScoringIndex = 0;
            showScreen('scoringScreen');
            updateScoringUI();
        }
        
        // Scoring Functions
        function updateScoringUI() {
            const container = document.getElementById('scoringPlayers');
            container.innerHTML = '';
            for (let i = 0; i < playerCount; i++) {
                container.innerHTML += `
                    <div class="scoring-player ${i === currentScoringIndex ? 'active' : ''}" onclick="selectScoringPlayer(${i})">
                        <div class="avatar">${String.fromCharCode(65 + i)}</div>
                        <div>${playerNames[i]}</div>
                    </div>
                `;
            }
            currentTiles = [];
            updateTilesDisplay();
        }
        
        function selectScoringPlayer(index) {
            currentScoringIndex = index;
            currentTiles = [];
            updateScoringUI();
        }
        
        function addTile(value) {
            currentTiles.push(value);
            updateTilesDisplay();
        }
        
        function updateTilesDisplay() {
            const expression = currentTiles.join(' + ');
            const total = currentTiles.reduce((a, b) => a + b, 0);
            document.getElementById('currentExpression').textContent = expression || '';
            document.getElementById('currentTotal').textContent = total > 0 ? '= ' + total : '= 0';
        }
        
        function clearLast() {
            currentTiles.pop();
            updateTilesDisplay();
        }
        
        function clearAll() {
            currentTiles = [];
            updateTilesDisplay();
        }
        
        function confirmScore() {
            if (currentTiles.length === 0) return;
            const total = currentTiles.reduce((a, b) => a + b, 0);
            scores[currentScoringIndex] -= total;
            
            if (currentScoringIndex < playerCount - 1) {
                currentScoringIndex++;
                currentTiles = [];
                updateScoringUI();
                document.getElementById('nextScoringBtn').style.display = 'none';
            } else {
                document.getElementById('nextScoringBtn').style.display = 'block';
                document.getElementById('nextScoringBtn').textContent = '✅ 確認並查看結果';
                document.getElementById('nextScoringBtn').onclick = showRoundResult;
            }
        }
        
        function nextScoringPlayer() {
            // Already handled in confirmScore
        }
        
        function showRoundResult() {
            document.getElementById('resultRound').textContent = round;
            
            // Calculate round scores (winner gets positive, others negative)
            const roundScores = [...scores];
            const winnerIndex = scores.indexOf(Math.max(...scores));
            const winnerScore = roundScores.reduce((a, b) => a + Math.abs(b), 0);
            roundScores[winnerIndex] = winnerScore;
            
            // Update display
            const tbody = document.getElementById('resultTableBody');
            tbody.innerHTML = '';
            for (let i = 0; i < playerCount; i++) {
                tbody.innerHTML += `
                    <tr class="${i === winnerIndex ? 'winner' : ''}">
                        <td>${String.fromCharCode(65 + i)} ${playerNames[i]}</td>
                        <td>${roundScores[i] > 0 ? '+' : ''}${roundScores[i]}</td>
                        <td>${scores[i]}</td>
                    </tr>
                `;
            }
            
            showScreen('resultScreen');
        }
        
        function nextRound() {
            round++;
            currentPlayerIndex = (currentPlayerIndex + 1) % playerCount;
            showScreen('gameScreen');
            updateGameUI();
            startTimer();
        }
        
        function endGame() {
            const sorted = scores.map((s, i) => ({name: playerNames[i], score: s, index: i}))
                .sort((a, b) => b.score - a.score);
            
            const tbody = document.getElementById('finalResultBody');
            tbody.innerHTML = '';
            sorted.forEach((p, i) => {
                tbody.innerHTML += `
                    <tr class="${i === 0 ? 'winner' : ''}">
                        <td>${i + 1} ${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : ''}</td>
                        <td>${p.name}</td>
                        <td>${p.score}</td>
                    </tr>
                `;
            });
            
            showScreen('finalResultScreen');
        }
        
        function resetGame() {
            showScreen('setupScreen');
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
