<!DOCTYPE html>
<html lang="zh-TW">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>12碼射門：座標挑戰</title>
 <style>
 :root {
 --grass-color: #4CAF50;
 --grass-dark: #388E3C;
 --sky-color: #87CEEB;
 --text-color: #333;
 }

 body {
 font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
 background-color: var(--sky-color);
 margin: 0;
 padding: 0;
 display: flex;
 flex-direction: column;
 align-items: center;
 overflow: hidden;
 }

 h1 {
 color: white;
 text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
 margin-top: 20px;
 margin-bottom: 5px;
 }

 .instructions {
 background: rgba(255,255,255,0.95);
 padding: 15px 25px;
 border-radius: 15px;
 margin: 10px 20px;
 max-width: 600px;
 text-align: center;
 box-shadow: 0 4px 10px rgba(0,0,0,0.2);
 }

 .instructions h3 {
 color: #E74C3C;
 margin: 0 0 10px 0;
 }

 .instructions p {
 margin: 5px 0;
 font-size: 14px;
 color: #333;
 }

 .coord-hint {
 display: inline-block;
 background: #FFF3CD;
 padding: 2px 8px;
 border-radius: 5px;
 font-weight: bold;
 color: #856404;
 }

 .stats {
 background-color: rgba(255, 255, 255, 0.9);
 padding: 10px 20px;
 border-radius: 20px;
 font-size: 1.2rem;
 font-weight: bold;
 margin-bottom: 15px;
 box-shadow: 0 4px 6px rgba(0,0,0,0.2);
 z-index: 10;
 }

 #message {
 font-size: 1.5rem;
 font-weight: bold;
 color: #FFEB3B;
 text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
 height: 40px;
 margin-bottom: 10px;
 z-index: 10;
 padding: 5px 15px;
 background: rgba(0,0,0,0.3);
 border-radius: 10px;
 }

 /* 球場與球門區域 */
 .field {
 position: relative;
 width: 100%;
 max-width: 500px;
 height: 350px;
 background: linear-gradient(var(--grass-dark) 0%, var(--grass-color) 100%);
 border-top: 5px solid white;
 display: flex;
 flex-direction: column;
 align-items: center;
 box-shadow: 0 -10px 20px rgba(0,0,0,0.2);
 }

 .goal-post {
 position: absolute;
 top: 20px;
 width: 80%;
 height: 120px;
 border: 8px solid white;
 border-bottom: none;
 background-image: 
 linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2)), 
 linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2));
 background-size: 20px 20px;
 background-position: 0 0, 10px 10px;
 display: flex;
 }

 /* 座標網格 */
 .coord-grid {
 display: grid;
 grid-template-columns: repeat(5, 1fr);
 grid-template-rows: repeat(4, 1fr);
 width: 100%;
 height: 100%;
 }

 .grid-cell {
 border: 1px dashed rgba(255,255,255,0.3);
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 0.7rem;
 color: rgba(255,255,255,0.5);
 transition: all 0.2s;
 }

 .grid-cell:hover {
 background: rgba(255,255,255,0.1);
 }

 .grid-cell.highlight {
 background: rgba(255, 235, 59, 0.3);
 border-color: #FFEB3B;
 }

 /* 座標軸標記 */
 .axis-label {
 position: absolute;
 color: white;
 font-weight: bold;
 font-size: 0.9rem;
 text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
 }

 .axis-x { bottom: 5px; right: 10%; }
 .axis-y { top: 30px; left: 10%; }

 /* 守門員 */
 #goalkeeper {
 position: absolute;
 bottom: 0;
 left: 50%;
 transform: translateX(-50%);
 font-size: 3rem;
 transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
 z-index: 2;
 }

 /* 足球 */
 #ball {
 position: absolute;
 bottom: 30px;
 left: 50%;
 transform: translateX(-50%);
 font-size: 2.5rem;
 transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
 z-index: 3;
 filter: drop-shadow(0 8px 4px rgba(0,0,0,0.4));
 }

 /* 射門動畫 */
 .shot-animation {
 animation: shootToGoal 0.5s forwards;
 }

 @keyframes shootToGoal {
 0% { bottom: 30px; left: 50%; transform: translateX(-50%) scale(1); }
 100% { bottom: 200px; left: var(--target-x); transform: translateX(-50%) scale(0.5); }
 }

 /* 輸入區域 */
 .input-area {
 background: white;
 padding: 15px 25px;
 border-radius: 15px;
 margin: 15px;
 display: flex;
 gap: 15px;
 align-items: center;
 justify-content: center;
 flex-wrap: wrap;
 box-shadow: 0 4px 10px rgba(0,0,0,0.1);
 }

 .input-area label {
 font-weight: bold;
 color: #333;
 }

 .input-area input {
 width: 60px;
 padding: 10px;
 font-size: 1.2rem;
 text-align: center;
 border: 2px solid #ddd;
 border-radius: 8px;
 }

 .input-area input:focus {
 outline: none;
 border-color: #4A90E2;
 }

 .input-area button {
 padding: 12px 25px;
 font-size: 1rem;
 background-color: #E74C3C;
 color: white;
 border: none;
 border-radius: 8px;
 cursor: pointer;
 font-weight: bold;
 transition: all 0.2s;
 }

 .input-area button:hover {
 background-color: #C0392B;
 transform: scale(1.05);
 }

 /* 結果 */
 .result-overlay {
 position: fixed;
 top: 0; left: 0; right: 0; bottom: 0;
 background: rgba(0,0,0,0.8);
 display: none;
 justify-content: center;
 align-items: center;
 z-index: 100;
 }

 .result-overlay.show {
 display: flex;
 }

 .result-box {
 background: white;
 padding: 30px 50px;
 border-radius: 20px;
 text-align: center;
 animation: popIn 0.3s;
 }

 @keyframes popIn {
 from { transform: scale(0.5); opacity: 0; }
 to { transform: scale(1); opacity: 1; }
 }

 .result-box h2 {
 font-size: 2.5rem;
 margin: 0 0 10px 0;
 }

 .result-box.goal h2 { color: #2ECC71; }
 .result-box.miss h2 { color: #E74C3C; }

 .result-box p {
 font-size: 1.2rem;
 color: #666;
 }

 .result-box button {
 margin-top: 20px;
 padding: 12px 30px;
 font-size: 1rem;
 background: #4A90E2;
 color: white;
 border: none;
 border-radius: 8px;
 cursor: pointer;
 }

 /* 重新開始 */
 button.reset-btn {
 margin-top: 15px;
 padding: 10px 20px;
 font-size: 1rem;
 background-color: #3498db;
 color: white;
 border: none;
 border-radius: 5px;
 cursor: pointer;
 }

 button.reset-btn:hover { background-color: #2980b9; }
 </style>
</head>
<body>

 <h1>⚽ 12碼射門：座標挑戰 🏆</h1>
 
 <div class="instructions">
 <h3>🎯 點樣玩？</h3>
 <p>球門分為 <span class="coord-hint">5列 × 4行</span></p>
 <p>例如：輸入 <span class="coord-hint">(3,2)</span> = 第3列，第2行</p>
 <p>由左數、由上數！同守門員鬥快！</p>
 </div>
 
 <div class="stats">
 進球: <span id="score" style="color: #4CAF50;">0</span> / 射門次數: <span id="attempts">0</span>
 </div>
 
 <div id="message">輸入座標射門！例如：3 2</div>

 <div class="field">
 <span class="axis-label axis-y">↑ 列 (1-5)</span>
 <div class="goal-post">
 <div class="coord-grid" id="grid">
 <!-- 5x4 grid will be generated by JS -->
 </div>
 </div>
 <span class="axis-label axis-x">行 → (1-4)</span>
 
 <div id="goalkeeper">🧤</div>
 <div id="ball">⚽</div>
 </div>

 <div class="input-area">
 <label>座標 (列 行)：</label>
 <input type="number" id="coord-x" min="1" max="5" placeholder="1-5">
 <input type="number" id="coord-y" min="1" max="4" placeholder="1-4">
 <button onclick="shoot()">🚀 射門！</button>
 </div>

 <button class="reset-btn" onclick="resetGame()">🔄 重新開始</button>

 <div class="result-overlay" id="resultOverlay">
 <div class="result-box" id="resultBox">
 <h2 id="resultTitle">GOAL!</h2>
 <p id="resultMessage"></p>
 <button onclick="closeResult()">下一球</button>
 </div>
 </div>

 <script>
 // 遊戲狀態
 let score = 0;
 let attempts = 0;
 let isShooting = false;
 let targetCell = { x: 0, y: 0 };

 const ball = document.getElementById('ball');
 const goalkeeper = document.getElementById('goalkeeper');
 const scoreEl = document.getElementById('score');
 const attemptsEl = document.getElementById('attempts');
 const messageEl = document.getElementById('message');
 const resultOverlay = document.getElementById('resultOverlay');
 const resultBox = document.getElementById('resultBox');

 // 初始化網格
 function initGrid() {
 const grid = document.getElementById('grid');
 grid.innerHTML = '';
 
 for (let row = 4; row >= 1; row--) { // 由上到下
 for (let col = 1; col <= 5; col++) { // 由左到右
 const cell = document.createElement('div');
 cell.className = 'grid-cell';
 cell.dataset.x = col;
 cell.dataset.y = row;
 cell.innerText = `(${col},${row})`;
 grid.appendChild(cell);
 }
 }
 }

 // 射門
 function shoot() {
 if (isShooting) return;
 
 const xInput = document.getElementById('coord-x');
 const yInput = document.getElementById('coord-y');
 const x = parseInt(xInput.value);
 const y = parseInt(yInput.value);
 
 // 驗證輸入
 if (isNaN(x) || isNaN(y) || x < 1 || x > 5 || y < 1 || y > 4) {
 messageEl.innerText = "❌ 輸入錯誤！請輸入 1-5 (列) 同 1-4 (行)";
 messageEl.style.color = "#E74C3C";
 return;
 }

 if (x === targetCell.x && y === targetCell.y) {
 // 燈蛾投火 - 射向守門員位置，一定被扑出
 messageEl.innerText = "🔥 射向守門員？！等我比你睇下...";
 } else {
 messageEl.innerText = "🚀 射門！";
 }
 
 messageEl.style.color = "#FFEB3B";
 attempts++;
 isShooting = true;
 
 // 守門員隨機移動
 const gkX = Math.floor(Math.random() * 5) + 1;
 const gkY = Math.floor(Math.random() * 4) + 1;
 
 // 移動守門員到目標位置
 const gkCell = document.querySelector(`.grid-cell[data-x="${gkX}"][data-y="${gkY}"]`);
 if (gkCell) {
 const field = document.querySelector('.field');
 const fieldRect = field.getBoundingClientRect();
 const gkRect = gkCell.getBoundingClientRect();
 
 const relativeX = ((gkX - 1) / 4) * 80 + 10;
 const relativeY = ((5 - gkY) / 3) * 80 + 20;
 
 goalkeeper.style.left = relativeX + '%';
 goalkeeper.style.top = relativeY + '%';
 }
 
 // 計算射門位置
 const targetXPercent = ((x - 1) / 4) * 80 + 10;
 const targetYPercent = ((5 - y) / 3) * 80 + 30;
 
 // 執行射門動畫
 ball.style.setProperty('--target-x', targetXPercent + '%');
 ball.classList.add('shot-animation');
 
 // 等待動畫結束後判斷
 setTimeout(() => {
 // 判斷進球或被扑
 let isGoal = false;
 
 if (x === gkX && y === gkY) {
 // 被守門員扑出
 messageEl.innerText = "❌ 俾守門員扑到！";
 messageEl.style.color = "#E74C3C";
 isGoal = false;
 } else if (x === targetCell.x && y === targetCell.y) {
 // 燈蛾投火
 messageEl.innerText = "😅 射向守門員？梗係被扑喇！";
 messageEl.style.color = "#E74C3C";
 isGoal = false;
 } else {
 // 進球！
 messageEl.innerText = "⚽⚽⚽ GOAL！！！";
 messageEl.style.color = "#2ECC71";
 score++;
 isGoal = true;
 }
 
 scoreEl.innerText = score;
 attemptsEl.innerText = attempts;
 
 // 顯示結果
 showResult(isGoal, x, y, gkX, gkY);
 
 }, 500);
 }

 function showResult(isGoal, x, y, gkX, gkY) {
 resultBox.className = 'result-box ' + (isGoal ? 'goal' : 'miss');
 document.getElementById('resultTitle').innerText = isGoal ? '⚽ GOAL!!!' : '❌ 被扑出！';
 
 let msg = `你射向 (${x},${y})\n`;
 msg += `守門員喺 (${gkX},${gkY})\n`;
 msg += isGoal ? '恭喜你入波！' : '下次早啲射過另一邊！';
 
 document.getElementById('resultMessage').innerText = msg;
 resultOverlay.classList.add('show');
 }

 function closeResult() {
 resultOverlay.classList.remove('show');
 ball.classList.remove('shot-animation');
 ball.style.bottom = '30px';
 ball.style.left = '50%';
 ball.style.transform = 'translateX(-50%)';
 
 // 重新隨機目標位置（守門員準備撲另一邊）
 targetCell = {
 x: Math.floor(Math.random() * 5) + 1,
 y: Math.floor(Math.random() * 4) + 1
 };
 
 // 守門員返去中間
 goalkeeper.style.left = '50%';
 goalkeeper.style.top = '';
 goalkeeper.style.transform = 'translateX(-50%)';
 
 messageEl.innerText = "再射過！記住避開守門員位置！";
 messageEl.style.color = "#FFEB3B";
 
 isShooting = false;
 }

 function resetGame() {
 score = 0;
 attempts = 0;
 scoreEl.innerText = score;
 attemptsEl.innerText = attempts;
 isShooting = false;
 ball.classList.remove('shot-animation');
 ball.style.bottom = '30px';
 ball.style.left = '50%';
 ball.style.transform = 'translateX(-50%)';
 goalkeeper.style.left = '50%';
 goalkeeper.style.top = '';
 goalkeeper.style.transform = 'translateX(-50%)';
 document.getElementById('coord-x').value = '';
 document.getElementById('coord-y').value = '';
 messageEl.innerText = "輸入座標射門！例如：3 2";
 messageEl.style.color = "#FFEB3B";
 
 // 隨機新目標
 targetCell = {
 x: Math.floor(Math.random() * 5) + 1,
 y: Math.floor(Math.random() * 4) + 1
 };
 
 closeResult();
 }

 // 鍵盤快捷鍵
 document.getElementById('coord-x').addEventListener('keypress', function(e) {
 if (e.key === 'Enter') shoot();
 });
 document.getElementById('coord-y').addEventListener('keypress', function(e) {
 if (e.key === 'Enter') shoot();
 });

 // 初始化
 initGrid();
 resetGame();
 </script>
</body>
</html>
