<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 數學遊戲專區 - 數學周 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            margin: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            font-weight: bold;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        .games-header {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }
        .games-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .games-header p {
            opacity: 0.9;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← 返回數學周</a>

    <div class="games-header">
        <h1>🎮 數學遊戲專區</h1>
        <p>計時挑戰！睇兩眼就識玩！</p>
    </div>

    <section class="games-section" style="background: transparent; padding: 20px;">
        <div class="games-grid">
            <div class="game-card" onclick="openGame('MultiplicationBattle')">
                <div class="game-icon">⚡</div>
                <h4>乘法拔河</h4>
                <p class="game-desc">5秒答啱一題乘法，你既拉力就會將對手拉過黎！答錯會被拉走！</p>
                <div class="game-rules">
                    <span>🎯 極速心算</span>
                    <span>⏱️ 5秒限時</span>
                </div>
            </div>
            
            <div class="game-card" onclick="openGame('RatioSafe')">
                <div class="game-icon">🔐</div>
                <h4>比例金庫</h4>
                <p class="game-desc">破解銀行密碼！計啱比例，等式就會成立！唔洗寫，只需要揀答案。</p>
                <div class="game-rules">
                    <span>🔢 求未知數</span>
                    <span>🧠 比例推理</span>
                </div>
            </div>
            
            <div class="game-card" onclick="openGame('MatrixConquest')">
                <div class="game-icon">🔢</div>
                <h4>矩陣爭奪戰</h4>
                <p class="game-desc">兩人對戰！抽兩個數字，揀最大公因數，用積木霸領土！邊個佔最多邊就贏！</p>
                <div class="game-rules">
                    <span>👥 雙人對戰</span>
                    <span>📐 最大公因數</span>
                </div>
            </div>
            
            <div class="game-card" onclick="openGame('PenaltyShootout')">
                <div class="game-icon">⚽</div>
                <h4>12碼射門</h4>
                <p class="game-desc">輸入座標射門！例如(3,2)就係球門既第三格第二行！同守門員鬥快！</p>
                <div class="game-rules">
                    <span>📍 座標輸入</span>
                    <span>🎯 射門準度</span>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
